# Thin wrapper workflow for the Arch image. The reusable workflow does the actual
# build and publish work; this file only defines Arch-specific settings.
name: Build ArchLinux (amd64-only)

permissions:
  # Read the repository, publish images to GHCR, and request signing identity.
  contents: read
  packages: write
  id-token: write

on:
  # Build every push so branches stay continuously validated.
  push:
  # Validate pull requests aimed at `main`.
  pull_request:
    branches:
      - main
  # Rebuild weekly to pick up fresh Arch packages even if the repo did not change.
  schedule:
    - cron: "0 1 * * TUE"
  # Support GitHub merge queue runs.
  merge_group:
  # Allow maintainers to trigger the workflow manually from the Actions tab.
  workflow_dispatch:

concurrency:
  # Cancel older in-flight runs for the same branch so CI time is spent on the
  # newest commit instead of stale ones.
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    # Reuse the common build pipeline and only supply Arch metadata here.
    uses: ./.github/workflows/reusable-build.yaml
    secrets: inherit
    with:
      image-name: arch-bootc
      image-desc: "Experimental arch-bootc POC image"
      image-keywords: "bootc,archlinux,arch"
      image-logo: "https://avatars.githubusercontent.com/u/230667510?s=400&u=cb912a5db49aee164a609a0fb4967d2d8170feb9&v=4"
      # Arch is currently built only for x86_64 in this repository.
      platforms: amd64
      # Pull requests should test builds, but only the default branch should
      # publish or rechunk images.
      rechunk: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
